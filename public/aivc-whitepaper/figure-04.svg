<svg viewBox="-24 -24 548 248" xmlns="http://www.w3.org/2000/svg" width="548" height="248" preserveAspectRatio="xMidYMid meet">
<rect fill="#f8f9fa" height="200" rx="10" width="500" x="0" y="0"></rect>
<text fill="#2E75B6" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="250" y="20">AI for Biology：从单分子到系统的三层递进</text>
<!-- Layer 1: Structure Prediction -->
<g transform="translate(50,40)">
<rect fill="#e3f2fd" height="40" rx="6" stroke="#42a5f5" stroke-width="1.5" width="400" x="0" y="0"></rect>
<text fill="#1565c0" font-family="sans-serif" font-size="11" font-weight="700" x="18" y="25">L1 结构预测</text>
<text fill="#555" font-family="sans-serif" font-size="10" x="155" y="25">AlphaFold2/3 · RoseTTAFold · ESMFold</text>
<text fill="#90caf9" font-family="sans-serif" font-size="9" text-anchor="end" x="385" y="25">判别式任务</text>
</g>
<!-- Arrow -->
<g transform="translate(245,82)"><text fill="#aaa" font-size="14" text-anchor="middle" x="0" y="10">↓</text>
<text fill="#888" font-family="sans-serif" font-size="8" x="30" y="10">验证工具</text></g>
<!-- Layer 2: Design -->
<g transform="translate(50,95)">
<rect fill="#fff3e0" height="40" rx="6" stroke="#ffa726" stroke-width="1.5" width="400" x="0" y="0"></rect>
<text fill="#e65100" font-family="sans-serif" font-size="11" font-weight="700" x="18" y="25">L2 分子设计</text>
<text fill="#555" font-family="sans-serif" font-size="10" x="155" y="25">RFdiffusion · ProteinMPNN · ProtGPT2</text>
<text fill="#ffcc80" font-family="sans-serif" font-size="9" text-anchor="end" x="385" y="25">生成式任务</text>
</g>
<!-- Arrow -->
<g transform="translate(245,137)"><text fill="#aaa" font-size="14" text-anchor="middle" x="0" y="10">↓</text>
<text fill="#888" font-family="sans-serif" font-size="8" x="30" y="10">干预手段</text></g>
<!-- Layer 3: AIVC -->
<g transform="translate(50,150)">
<rect fill="#e8f5e9" height="40" rx="6" stroke="#66bb6a" stroke-width="2" width="400" x="0" y="0"></rect>
<text fill="#2e7d32" font-family="sans-serif" font-size="11" font-weight="700" x="18" y="25">L3 虚拟细胞</text>
<text fill="#555" font-family="sans-serif" font-size="10" x="155" y="25">Geneformer · scGPT · CellWhisperer · AIVC</text>
<text fill="#a5d6a7" font-family="sans-serif" font-size="9" text-anchor="end" x="385" y="25">系统级理解</text>
</g>
<!-- 左侧标注 -->
<line stroke="#ccc" stroke-width="1" x1="38" x2="38" y1="55" y2="175"></line>
<text fill="#aaa" font-family="sans-serif" font-size="9" text-anchor="middle" transform="rotate(-90,36,120)" x="36" y="120">复杂度递增 →</text>
</svg>