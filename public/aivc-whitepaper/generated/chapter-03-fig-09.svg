<title id="title">图3-9｜Bulk平均信号与单细胞异质性</title>
<desc id="desc">左侧bulk把不同颜色细胞平均成一个信号，右侧single-cell保留不同细胞群。</desc>
<rect width="1100" height="620" fill="#f8fafc"/>
<rect x="44" y="44" width="1012" height="532" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="550" y="92" text-anchor="middle" font-family="Inter, 'Microsoft YaHei', Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">图3-9｜Bulk平均信号与单细胞异质性</text>
<line x1="193" y1="302" x2="462" y2="338" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="23" y="248" width="164" height="108" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
<text x="105" y="310" text-anchor="middle" font-family="Inter, 'Microsoft YaHei', Arial, sans-serif" font-size="20" font-weight="600" fill="#1f2937">Bulk平均信号</text>
<line x1="638" y1="338" x2="907" y2="302" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="468" y="284" width="164" height="108" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
<text x="550" y="332" text-anchor="middle" font-family="Inter, 'Microsoft YaHei', Arial, sans-serif" font-size="20" font-weight="600" fill="#1f2937">单细胞异质性</text>
<text x="550" y="357" text-anchor="middle" font-family="Inter, 'Microsoft YaHei', Arial, sans-serif" font-size="20" font-weight="600" fill="#1f2937">bulk把不同颜色细胞平均成一个信号</text>

<rect x="913" y="248" width="164" height="108" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
<text x="995" y="310" text-anchor="middle" font-family="Inter, 'Microsoft YaHei', Arial, sans-serif" font-size="20" font-weight="600" fill="#1f2937">single-cell保留不同细胞群</text>
<text x="550" y="542" text-anchor="middle" font-family="Inter, 'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#64748b">左侧bulk把不同颜色细胞平均成一个信号，右侧single-cell保留不同细胞群。</text>
