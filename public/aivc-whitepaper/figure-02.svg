<svg viewBox="-24 -24 548 248" xmlns="http://www.w3.org/2000/svg" width="548" height="248" preserveAspectRatio="xMidYMid meet">
<rect fill="#f8f9fa" height="200" rx="10" width="500" x="0" y="0"></rect>
<!-- 标题 -->
<text fill="#2E75B6" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="250" y="22">Multi-Head Self-Attention 机制示意</text>
<!-- 输入序列 -->
<g transform="translate(30,55)">
<text fill="#888" font-family="sans-serif" font-size="10" x="0" y="-5">输入序列</text>
<rect fill="#e3f2fd" height="22" rx="3" stroke="#90caf9" stroke-width="1" width="28" x="0" y="0"></rect><text fill="#1565c0" font-family="sans-serif" font-size="9" text-anchor="middle" x="14" y="15">Ala</text>
<rect fill="#e3f2fd" height="22" rx="3" stroke="#90caf9" stroke-width="1" width="28" x="32" y="0"></rect><text fill="#1565c0" font-family="sans-serif" font-size="9" text-anchor="middle" x="46" y="15">Gly</text>
<rect fill="#e3f2fd" height="22" rx="3" stroke="#90caf9" stroke-width="1" width="28" x="64" y="0"></rect><text fill="#1565c0" font-family="sans-serif" font-size="9" text-anchor="middle" x="78" y="15">...</text>
<rect fill="#fce4ec" height="22" rx="3" stroke="#ef9a9a" stroke-width="1" width="28" x="96" y="0"></rect><text fill="#c62828" font-family="sans-serif" font-size="9" text-anchor="middle" x="110" y="15">Leu</text>
<rect fill="#e3f2fd" height="22" rx="3" stroke="#90caf9" stroke-width="1" width="28" x="128" y="0"></rect><text fill="#1565c0" font-family="sans-serif" font-size="9" text-anchor="middle" x="142" y="15">...</text>
</g>
<!-- QKV投影 -->
<g transform="translate(200,42)">
<text fill="#888" font-family="sans-serif" font-size="10" text-anchor="middle" x="30" y="0">线性投影</text>
<rect fill="#e8f5e9" height="56" rx="3" stroke="#81c784" stroke-width="1" width="20" x="0" y="6"></rect>
<text fill="#2e7d32" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="10" y="38">Q</text>
<rect fill="#fff3e0" height="56" rx="3" stroke="#ffb74d" stroke-width="1" width="20" x="25" y="6"></rect>
<text fill="#e65100" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="35" y="38">K</text>
<rect fill="#f3e5f5" height="56" rx="3" stroke="#ce93d8" stroke-width="1" width="20" x="50" y="6"></rect>
<text fill="#6a1b9a" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="60" y="38">V</text>
</g>
<!-- 箭头 input → QKV -->
<line marker-end="url(#arrowG)" stroke="#aaa" stroke-width="1.5" x1="165" x2="195" y1="66" y2="66"></line>
<!-- 注意力矩阵 -->
<g transform="translate(300,42)">
<text fill="#888" font-family="sans-serif" font-size="10" text-anchor="middle" x="30" y="0">注意力权重</text>
<!-- 热力图小方格 -->
<g transform="translate(0,6)">
<rect fill="#bbdefb" height="12" width="12" x="0" y="0"></rect><rect fill="#e3f2fd" height="12" width="12" x="13" y="0"></rect>
<rect fill="#e3f2fd" height="12" width="12" x="26" y="0"></rect><rect fill="#1565c0" height="12" width="12" x="39" y="0"></rect>
<rect fill="#e3f2fd" height="12" width="12" x="52" y="0"></rect>
<rect fill="#e3f2fd" height="12" width="12" x="0" y="13"></rect><rect fill="#90caf9" height="12" width="12" x="13" y="13"></rect>
<rect fill="#e3f2fd" height="12" width="12" x="26" y="13"></rect><rect fill="#e3f2fd" height="12" width="12" x="39" y="13"></rect>
<rect fill="#42a5f5" height="12" width="12" x="52" y="13"></rect>
<rect fill="#e3f2fd" height="12" width="12" x="0" y="26"></rect><rect fill="#e3f2fd" height="12" width="12" x="13" y="26"></rect>
<rect fill="#64b5f6" height="12" width="12" x="26" y="26"></rect><rect fill="#e3f2fd" height="12" width="12" x="39" y="26"></rect>
<rect fill="#e3f2fd" height="12" width="12" x="52" y="26"></rect>
<rect fill="#1565c0" height="12" width="12" x="0" y="39"></rect><rect fill="#e3f2fd" height="12" width="12" x="13" y="39"></rect>
<rect fill="#e3f2fd" height="12" width="12" x="26" y="39"></rect><rect fill="#90caf9" height="12" width="12" x="39" y="39"></rect>
<rect fill="#e3f2fd" height="12" width="12" x="52" y="39"></rect>
</g>
</g>
<!-- 箭头 QKV → attention -->
<line marker-end="url(#arrowG)" stroke="#aaa" stroke-width="1.5" x1="275" x2="295" y1="66" y2="66"></line>
<!-- 输出 -->
<g transform="translate(390,42)">
<text fill="#888" font-family="sans-serif" font-size="10" text-anchor="middle" x="40" y="0">输出表征</text>
<rect fill="#e8eaf6" height="56" rx="6" stroke="#7986cb" stroke-width="1.5" width="60" x="10" y="6"></rect>
<text fill="#3949ab" font-family="sans-serif" font-size="9" text-anchor="middle" x="40" y="30">捕获远程</text>
<text fill="#3949ab" font-family="sans-serif" font-size="9" text-anchor="middle" x="40" y="44">残基交互</text>
</g>
<line marker-end="url(#arrowG)" stroke="#aaa" stroke-width="1.5" x1="370" x2="395" y1="66" y2="66"></line>
<!-- 底部标注 -->
<g transform="translate(20,120)">
<text fill="#c62828" font-family="sans-serif" font-size="10" x="0" y="0">▲ 关键洞察：</text>
<text fill="#666" font-family="sans-serif" font-size="10" x="0" y="16">序列上相距很远的残基（如位置1和位置4），在注意力矩阵中可以有很高的权重</text>
<text fill="#666" font-family="sans-serif" font-size="10" x="0" y="32">→ 这恰好对应蛋白质三维结构中的远程空间接触</text>
<!-- 示意弧线 -->
<path d="M320,25 C340,0 380,0 400,25" fill="none" opacity="0.6" stroke="#c62828" stroke-dasharray="3,2" stroke-width="1.5"></path>
<text fill="#c62828" font-family="sans-serif" font-size="8" text-anchor="middle" x="360" y="12">远程接触</text>
</g>
<defs><marker id="arrowG" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><path d="M0,0 L8,3 L0,6" fill="#aaa"></path></marker></defs>
</svg>