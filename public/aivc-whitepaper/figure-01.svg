<line stroke="rgba(100,180,255,0.3)" stroke-width="1" x1="-60" x2="-20" y1="-30" y2="-20"></line>
<line stroke="rgba(100,180,255,0.3)" stroke-width="1" x1="-60" x2="-20" y1="0" y2="-20"></line>
<line stroke="rgba(100,180,255,0.2)" stroke-width="1" x1="-60" x2="-20" y1="30" y2="-20"></line>
<line stroke="rgba(100,180,255,0.2)" stroke-width="1" x1="-60" x2="-20" y1="-30" y2="20"></line>
<line stroke="rgba(100,180,255,0.3)" stroke-width="1" x1="-60" x2="-20" y1="0" y2="20"></line>
<line stroke="rgba(100,180,255,0.3)" stroke-width="1" x1="-60" x2="-20" y1="30" y2="20"></line>
<line stroke="rgba(100,180,255,0.4)" stroke-width="1" x1="-20" x2="20" y1="-20" y2="-15"></line>
<line stroke="rgba(100,180,255,0.3)" stroke-width="1" x1="-20" x2="20" y1="-20" y2="15"></line>
<line stroke="rgba(100,180,255,0.3)" stroke-width="1" x1="-20" x2="20" y1="20" y2="-15"></line>
<line stroke="rgba(100,180,255,0.4)" stroke-width="1" x1="-20" x2="20" y1="20" y2="15"></line>
<line stroke="rgba(100,180,255,0.4)" stroke-width="1.5" x1="20" x2="55" y1="-15" y2="0"></line>
<line stroke="rgba(100,180,255,0.4)" stroke-width="1.5" x1="20" x2="55" y1="15" y2="0"></line>
<!-- 输入层节点 -->
<circle cx="-60" cy="-30" fill="#1e88e5" opacity="0.7" r="6"></circle><circle cx="-60" cy="0" fill="#1e88e5" opacity="0.7" r="6"></circle>
<circle cx="-60" cy="30" fill="#1e88e5" opacity="0.7" r="6"></circle>
<!-- 隐藏层 -->
<circle cx="-20" cy="-20" fill="#7c4dff" opacity="0.7" r="7"></circle><circle cx="-20" cy="20" fill="#7c4dff" opacity="0.7" r="7"></circle>
<circle cx="20" cy="-15" fill="#7c4dff" opacity="0.7" r="7"></circle><circle cx="20" cy="15" fill="#7c4dff" opacity="0.7" r="7"></circle>
