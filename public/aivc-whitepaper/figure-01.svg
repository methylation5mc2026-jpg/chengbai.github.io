<circle cx="55" cy="0" fill="#00e676" opacity="0.6" r="8" stroke="#00e676" stroke-width="2"></circle>
<text fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10" text-anchor="middle" x="0" y="55">深度学习</text>
</g>
<!-- 右侧：细胞 -->
<g transform="translate(420,80)">
<ellipse cx="0" cy="0" fill="none" opacity="0.5" rx="42" ry="38" stroke="#4dd0e1" stroke-width="2"></ellipse>
<ellipse cx="0" cy="0" fill="none" opacity="0.3" rx="38" ry="34" stroke="#4dd0e1" stroke-dasharray="4,3" stroke-width="1"></ellipse>
<!-- 细胞核 -->
<ellipse cx="5" cy="-2" fill="rgba(77,208,225,0.15)" opacity="0.6" rx="16" ry="14" stroke="#4dd0e1" stroke-width="1.5"></ellipse>
<!-- 细胞器 -->
<ellipse cx="-18" cy="12" fill="none" opacity="0.5" rx="8" ry="5" stroke="#80cbc4" stroke-width="1" transform="rotate(-20,-18,12)"></ellipse>
<circle cx="22" cy="16" fill="none" opacity="0.5" r="4" stroke="#80cbc4" stroke-width="1"></circle>
<circle cx="-10" cy="-18" fill="rgba(128,203,196,0.3)" r="3"></circle>
<circle cx="20" cy="-14" fill="rgba(128,203,196,0.25)" r="2.5"></circle>
<!-- DNA双螺旋 in nucleus -->
<path d="M-2,-8 C2,-6 8,-4 4,-1 C0,2 -6,4 -2,7" fill="none" opacity="0.4" stroke="#fff" stroke-width="1"></path>
<path d="M6,-8 C2,-6 -4,-4 0,-1 C4,2 10,4 6,7" fill="none" opacity="0.4" stroke="#fff" stroke-width="1"></path>
<text fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10" text-anchor="middle" x="0" y="55">虚拟细胞</text>
</g>
<!-- 箭头连接 -->
<g>
<path d="M100,80 L160,80" marker-end="url(#arrowW)" stroke="rgba(100,180,255,0.4)" stroke-dasharray="4,3" stroke-width="1.5"></path>
<path d="M310,80 L360,80" marker-end="url(#arrowW)" stroke="rgba(100,180,255,0.4)" stroke-dasharray="4,3" stroke-width="1.5"></path>
</g>
<defs><marker id="arrowW" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><path d="M0,0 L8,3 L0,6" fill="rgba(100,180,255,0.5)"></path></marker></defs>
</svg>