<svg viewBox="-24 -24 548 198" xmlns="http://www.w3.org/2000/svg" width="548" height="198" preserveAspectRatio="xMidYMid meet">
<rect fill="#f8f9fa" height="150" rx="10" width="500" x="0" y="0"></rect>
<text fill="#2E75B6" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="250" y="20">扩散模型在蛋白质设计中的工作原理</text>
<!-- 前向加噪过程 -->
<text fill="#e53935" font-family="sans-serif" font-size="9" text-anchor="middle" x="250" y="38">前向过程：逐步加噪 →</text>
<!-- Step 1: Protein structure -->
<g transform="translate(30,55)">
<rect fill="#e8f5e9" height="60" rx="6" stroke="#66bb6a" stroke-width="1.5" width="70" x="0" y="0"></rect>
<path d="M15,15 C20,25 30,20 35,30 C40,20 50,25 55,15" fill="none" stroke="#2e7d32" stroke-width="2"></path>
<path d="M20,30 C25,40 35,35 40,45" fill="none" stroke="#2e7d32" stroke-width="2"></path>
<text fill="#2e7d32" font-family="sans-serif" font-size="8" text-anchor="middle" x="35" y="55">真实结构</text>
</g>
<!-- Arrow -->
<text fill="#ccc" font-size="16" text-anchor="middle" x="115" y="82">→</text>
<!-- Step 2: Partially noisy -->
<g transform="translate(130,55)">
<rect fill="#fff8e1" height="60" rx="6" stroke="#ffb74d" stroke-width="1.5" width="70" x="0" y="0"></rect>
<path d="M15,18 C22,26 28,22 35,28 C42,22 48,28 55,18" fill="none" opacity="0.6" stroke="#f57c00" stroke-width="1.5"></path>
<circle cx="20" cy="35" fill="#bbb" opacity="0.4" r="2"></circle><circle cx="38" cy="40" fill="#bbb" opacity="0.3" r="2.5"></circle>
<circle cx="50" cy="30" fill="#bbb" opacity="0.4" r="2"></circle><circle cx="25" cy="22" fill="#bbb" opacity="0.3" r="1.5"></circle>
<text fill="#f57c00" font-family="sans-serif" font-size="8" text-anchor="middle" x="35" y="55">部分加噪</text>
</g>
<text fill="#ccc" font-size="16" text-anchor="middle" x="215" y="82">→</text>
<!-- Step 3: Pure noise -->
<g transform="translate(230,55)">
<rect fill="#ffebee" height="60" rx="6" stroke="#ef9a9a" stroke-width="1.5" width="70" x="0" y="0"></rect>
<circle cx="15" cy="15" fill="#bbb" opacity="0.5" r="2"></circle><circle cx="35" cy="20" fill="#bbb" opacity="0.4" r="2.5"></circle>
<circle cx="55" cy="12" fill="#bbb" opacity="0.5" r="2"></circle><circle cx="20" cy="35" fill="#bbb" opacity="0.3" r="3"></circle>
<circle cx="45" cy="38" fill="#bbb" opacity="0.4" r="2"></circle><circle cx="30" cy="42" fill="#bbb" opacity="0.3" r="2.5"></circle>
<circle cx="50" cy="28" fill="#bbb" opacity="0.5" r="2"></circle><circle cx="12" cy="25" fill="#bbb" opacity="0.4" r="1.5"></circle>
<text fill="#c62828" font-family="sans-serif" font-size="8" text-anchor="middle" x="35" y="55">纯噪声</text>
</g>
<!-- 逆向去噪 -->
<text fill="#2e7d32" font-family="sans-serif" font-size="9" text-anchor="middle" x="250" y="128">← 逆向过程：神经网络逐步去噪（RFdiffusion核心）</text>
<!-- Reverse arrow -->
<g transform="translate(315,65)">
<text fill="#ccc" font-size="16" text-anchor="middle" x="5" y="17">→</text>
</g>
<!-- Step 4: Generated new protein -->
<g transform="translate(340,55)">
<rect fill="#f3e5f5" height="60" rx="6" stroke="#ab47bc" stroke-width="1.5" width="70" x="0" y="0"></rect>
<path d="M15,20 C22,12 32,28 38,18 C44,28 52,12 58,22" fill="none" stroke="#7b1fa2" stroke-width="2"></path>
<path d="M20,30 C28,40 38,32 48,42" fill="none" stroke="#7b1fa2" stroke-width="2"></path>
<text fill="#7b1fa2" font-family="sans-serif" font-size="8" text-anchor="middle" x="35" y="55">去噪生成</text>
</g>
<text fill="#ccc" font-size="16" text-anchor="middle" x="425" y="82">=</text>
<!-- Final: New protein! -->
<g transform="translate(440,55)">
<rect fill="#e8f5e9" height="60" rx="6" stroke="#66bb6a" stroke-width="2" width="50" x="0" y="0"></rect>
<text fill="#2e7d32" font-size="16" text-anchor="middle" x="25" y="22">✨</text>
<text fill="#2e7d32" font-family="sans-serif" font-size="8" font-weight="700" text-anchor="middle" x="25" y="40">全新</text>
<text fill="#2e7d32" font-family="sans-serif" font-size="8" font-weight="700" text-anchor="middle" x="25" y="52">蛋白质!</text>
</g>
</svg>