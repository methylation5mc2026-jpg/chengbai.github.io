<circle cx="470" cy="130" fill="rgba(100,180,255,0.2)" r="1"></circle><circle cx="350" cy="15" fill="rgba(100,180,255,0.25)" r="1.2"></circle>
<!-- 左侧：α螺旋蛋白质结构 -->
<g transform="translate(60,80)">
<path d="M-20,-50 C-5,-45 5,-35 -10,-30 C-25,-25 -15,-15 0,-10 C15,-5 5,5 -10,10 C-25,15 -15,25 0,30 C15,35 5,45 -10,50" fill="none" opacity="0.8" stroke="#64b5f6" stroke-width="3"></path>
<path d="M-10,-50 C5,-45 15,-35 0,-30 C-15,-25 -5,-15 10,-10 C25,-5 15,5 0,10 C-15,15 -5,25 10,30 C25,35 15,45 0,50" fill="none" opacity="0.8" stroke="#42a5f5" stroke-width="3"></path>
<circle cx="-15" cy="-47" fill="#ef5350" opacity="0.7" r="4"></circle><circle cx="10" cy="-30" fill="#66bb6a" opacity="0.7" r="3.5"></circle>
<circle cx="-12" cy="-10" fill="#ffa726" opacity="0.7" r="4"></circle><circle cx="12" cy="10" fill="#ab47bc" opacity="0.7" r="3.5"></circle>
<circle cx="-12" cy="30" fill="#29b6f6" opacity="0.7" r="4"></circle><circle cx="10" cy="48" fill="#ef5350" opacity="0.7" r="3.5"></circle>
<text fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10" text-anchor="middle" x="0" y="70">蛋白质结构</text>
</g>
<!-- 中间：神经网络节点 -->
<g transform="translate(250,80)">
